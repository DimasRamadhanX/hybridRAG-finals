version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j-midterm
    ports:
      - "7474:7474" # HTTP (Browser UI)
      - "7687:7687" # Bolt (Python Driver)
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
    environment:
      # Plugin otomatis
      - NEO4J_PLUGINS=["graph-data-science", "apoc"]
      
      # ⚡ PERBAIKAN: Kredensial dinamis otomatis membaca dari file .env kamu
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      
      # PERBAIKAN KONFIGURASI MEMORI (Versi Neo4j 5+)
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      
      # Keamanan Prosedur (GDS & APOC)
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      
      # Pengaturan Tambahan agar GDS lancar
      - NEO4J_server_config_strict__validation_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "wget --no-proxy --quiet --spider --tries=1 http://localhost:7474 || exit 1"]
      interval: 20s # Ditingkatkan agar memberi waktu download plugin
      timeout: 10s
      retries: 10

